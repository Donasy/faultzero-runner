name: FaultZero Scan

on:
  repository_dispatch:
    types: [scan]

env:
  SCAN_ID: ${{ github.event.client_payload.scan_id }}
  TARGET_URL: ${{ github.event.client_payload.target_url }}
  VUS: ${{ github.event.client_payload.vus }}
  RESULTS_DIR: ${{ github.workspace }}/results
  FALLBACK_API_URL: ${{ secrets.FALLBACK_API_URL }}
  N8N_FALLBACK_SECRET: ${{ secrets.N8N_FALLBACK_SECRET }}

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Create results directory
        run: mkdir -p "$RESULTS_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          echo '{}' > package.json
          npm install playwright-extra@latest playwright@latest playwright-core@latest puppeteer-extra-plugin-stealth@latest
          npx playwright install chromium --with-deps

      - name: Run Playwright crawl
        id: playwright
        run: node scripts/scan/playwright-crawl.mjs

      - name: Run Security Scan
        id: security
        run: node scripts/scan/security-scan.mjs

      - name: Run Secret Scan
        id: secrets
        run: node scripts/scan/secret-scan.mjs

      - name: Aggregate Reports
        id: aggregate
        run: node scripts/scan/aggregate-reports.mjs

      - name: Mark scan as failed (Fallback)
        if: failure() || cancelled()
        run: |
          echo "Job failed with exit code $?"
          curl -v -X PATCH "$FALLBACK_API_URL/api/scans/$SCAN_ID/fail" \
          -H "Content-Type: application/json" \
          -H "x-fallback-secret: $N8N_FALLBACK_SECRET" \
          -d "{\"status\": \"failed\", \"error\": \"GitHub Action Execution Failed\"}"

      - name: Send Report to n8n
        if: success()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          REPORT=$(cat "$RESULTS_DIR/final_report.json")
          jq -n \
            --arg scan_id "$SCAN_ID" \
            --arg target_url "$TARGET_URL" \
            --arg status "$JOB_STATUS" \
            --argjson report "$REPORT" \
            '{scan_id: $scan_id, target_url: $target_url, status: $status, report: $report}' | \
          curl -s -X POST "https://n8n.ali-alhaj.site/webhook/faultzero-report" \
            -H "Content-Type: application/json" \
            -d @-
          echo "[n8n] sent successfully"
