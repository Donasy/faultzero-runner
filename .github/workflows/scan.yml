name: FaultZero Scan

on:
  repository_dispatch:
    types: [scan]

env:
  SCAN_ID: ${{ github.event.client_payload.scan_id }}
  TARGET_URL: ${{ github.event.client_payload.target_url }}
  VUS: ${{ github.event.client_payload.vus }}
  RESULTS_DIR: ${{ github.workspace }}/results
  FALLBACK_API_URL: ${{ secrets.FALLBACK_API_URL }}
  N8N_FALLBACK_SECRET: ${{ secrets.N8N_FALLBACK_SECRET }}

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Create results directory
        run: mkdir -p "$RESULTS_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          echo '{}' > package.json
          npm install playwright@latest playwright-core@latest
          npx playwright install chromium --with-deps

      - name: Run Playwright crawl
        id: playwright
        run: node scripts/scan/playwright-crawl.mjs

      - name: Mark scan as failed (Fallback)
        if: failure() || cancelled()
        run: |
          echo "Job failed with exit code $?"
          curl -v -X PATCH "$FALLBACK_API_URL/api/scans/$SCAN_ID/fail" \
          -H "Content-Type: application/json" \
          -H "x-fallback-secret: $N8N_FALLBACK_SECRET" \
          -d "{\"status\": \"failed\", \"error\": \"GitHub Action Execution Failed\"}"

      - name: Send Report to n8n
        if: success()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync(process.env.RESULTS_DIR + '/playwright.json', 'utf8'));
          const payload = JSON.stringify({
            scan_id: process.env.SCAN_ID,
            target_url: process.env.TARGET_URL,
            status: process.env.JOB_STATUS,
            report: report
          });
          const https = require('https');
          const req = https.request('https://n8n.ali-alhaj.site/webhook/faultzero-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          }, (res) => {
            console.log('[n8n] status=' + res.statusCode);
          });
          req.write(payload);
          req.end();
          "
